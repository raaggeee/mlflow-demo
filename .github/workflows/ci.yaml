name: CI Pipeline

on: 
  push:
    branches:
      - main

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.9"

      - name: Install Dpeendecies
        run: |
          python3 -m pip install --updgrade pip
          pip install requirements.txt

      - name: Run DVC
        run: |
          dvc repro